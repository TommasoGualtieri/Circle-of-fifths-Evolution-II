<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circolo delle Quinte - Pro</title>
    <style>
        :root {
            --primary-green: #66bb6a;
            --dark-gray: #424242;
            --accent-gold: #ffca28;
            --bg-light: #f1f3f4;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-light); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 900px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px-35px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--dark-gray); margin-bottom: 50px; }

        /* CIRCOLO */
        .circle-wrapper { position: relative; width: 500px; height: 500px; margin: 0 auto 40px auto; }
        
        /* Pentagramma SVG integrato */
        .staff-box {
            position: absolute; width: 60px; height: 45px; margin-left: -30px;
            display: flex; flex-direction: column; align-items: center; pointer-events: none;
        }
        .staff-lines { width: 40px; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; height: 12px; margin-bottom: 2px; position: relative;}
        .staff-lines::after { content: ''; position: absolute; top: 50%; width: 100%; border-top: 1px solid #ccc; }
        .sig-text { font-family: serif; font-weight: bold; font-size: 1.1em; color: #444; }

        /* Bottoni Nota */
        .note-btn {
            position: absolute; width: 80px; height: 80px; margin: -40px;
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--primary-green); color: white; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 2;
        }
        .note-btn b { font-size: 1.3em; }
        .note-btn span { font-size: 0.8em; font-weight: normal; opacity: 0.9; }
        .note-btn.active { background: var(--dark-gray); transform: scale(1.15); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

        /* Gradi Gialli */
        .degree-marker {
            position: absolute; width: 28px; height: 28px; background: var(--accent-gold);
            border-radius: 50%; font-size: 11px; font-weight: bold; color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none; transition: all 0.5s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); border: 2px solid white;
        }

        /* TABELLE */
        .card { border: 1px solid #e0e0e0; border-radius: 12px; margin-bottom: 20px; overflow: hidden; background: #fff; }
        .card-header { background: #f8f9fa; padding: 15px; font-weight: bold; font-size: 1.1em; border-bottom: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; color: #888; font-size: 0.8em; padding: 10px; border-bottom: 1px solid #eee; text-transform: uppercase; }
        td { padding: 20px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; font-size: 1.2em; color: var(--dark-gray); width: 14.2%; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Circle of Fifths Interactive</h1>
    
    <div class="circle-wrapper" id="circle">
        <div id="deg-0" class="degree-marker">I</div>
        <div id="deg-1" class="degree-marker">ii</div>
        <div id="deg-2" class="degree-marker">iii</div>
        <div id="deg-3" class="degree-marker">IV</div>
        <div id="deg-4" class="degree-marker">V</div>
        <div id="deg-5" class="degree-marker">vi</div>
        <div id="deg-6" class="degree-marker">viiﾂｰ</div>
    </div>

    <div class="card">
        <div class="card-header" id="maj-title">Armonizzazione Maggiore</div>
        <table>
            <thead><tr><th>I</th><th>ii</th><th>iii</th><th>IV</th><th>V</th><th>vi</th><th>viiﾂｰ</th></tr></thead>
            <tbody id="maj-body"><tr><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr></tbody>
        </table>
    </div>

    <div class="card">
        <div class="card-header" id="min-title">Armonizzazione Minore Naturale</div>
        <table>
            <thead><tr><th>i</th><th>iiﾂｰ</th><th>III</th><th>iv</th><th>v</th><th>VI</th><th>VII</th></tr></thead>
            <tbody id="min-body"><tr><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    // Database note: maj, min, sig, scale_notes (per armonizzazione)
    const data = [
        { maj: "C", min: "Am", sig: "", notes: ["C","D","E","F","G","A","B"] },
        { maj: "G", min: "Em", sig: "1笙ｯ", notes: ["G","A","B","C","D","E","F笙ｯ"] },
        { maj: "D", min: "Bm", sig: "2笙ｯ", notes: ["D","E","F笙ｯ","G","A","B","C笙ｯ"] },
        { maj: "A", min: "F笙ｯm", sig: "3笙ｯ", notes: ["A","B","C笙ｯ","D","E","F笙ｯ","G笙ｯ"] },
        { maj: "E", min: "C笙ｯm", sig: "4笙ｯ", notes: ["E","F笙ｯ","G笙ｯ","A","B","C笙ｯ","D笙ｯ"] },
        { maj: "B", min: "G笙ｯm", sig: "5笙ｯ", notes: ["B","C笙ｯ","D笙ｯ","E","F笙ｯ","G笙ｯ","A笙ｯ"] },
        { maj: "G笙ｭ", min: "E笙ｭm", sig: "6笙ｭ", notes: ["G笙ｭ","A笙ｭ","B笙ｭ","C笙ｭ","D笙ｭ","E笙ｭ","F"] },
        { maj: "D笙ｭ", min: "B笙ｭm", sig: "5笙ｭ", notes: ["D笙ｭ","E笙ｭ","F","G笙ｭ","A笙ｭ","B笙ｭ","C"] },
        { maj: "A笙ｭ", min: "Fm", sig: "4笙ｭ", notes: ["A笙ｭ","B笙ｭ","C","D笙ｭ","E笙ｭ","F","G"] },
        { maj: "E笙ｭ", min: "Cm", sig: "3笙ｭ", notes: ["E笙ｭ","F","G","A笙ｭ","B笙ｭ","C","D"] },
        { maj: "B笙ｭ", min: "Gm", sig: "2笙ｭ", notes: ["B笙ｭ","C","D","E笙ｭ","F","G","A"] },
        { maj: "F", min: "Dm", sig: "1笙ｭ", notes: ["F","G","A","B笙ｭ","C","D","E"] }
    ];

    const circle = document.getElementById('circle');

    // Creazione elementi grafici
    data.forEach((item, i) => {
        const angle = (i * 30 - 90) * (Math.PI / 180);
        const x = 250 + 180 * Math.cos(angle);
        const y = 250 + 180 * Math.sin(angle);

        // Pentagramma stilizzato
        const staff = document.createElement('div');
        staff.className = 'staff-box';
        staff.style.left = x + 'px'; staff.style.top = (y - 85) + 'px';
        staff.innerHTML = `<div class="staff-lines"></div><span class="sig-text">${item.sig}</span>`;
        circle.appendChild(staff);

        // Bottone Nota
        const btn = document.createElement('div');
        btn.className = 'note-btn';
        btn.style.left = x + 'px'; btn.style.top = y + 'px';
        btn.innerHTML = `<b>${item.maj}</b><span>${item.min}</span>`;
        btn.onclick = () => update(i);
        btn.id = `btn-${i}`;
        circle.appendChild(btn);
    });

    function update(idx) {
        const selected = data[idx];

        // 1. Attiva bottone
        document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${idx}`).classList.add('active');

        // 2. Sposta Gradi Gialli (Offset fissi nel circolo delle quinte)
        const offsets = [0, 2, 4, -1, 1, 3, 5]; 
        offsets.forEach((offset, i) => {
            const pos = (idx + offset + 12) % 12;
            const angle = (pos * 30 - 90) * (Math.PI / 180);
            const r = 125;
            const dot = document.getElementById(`deg-${i}`);
            dot.style.left = (250 + r * Math.cos(angle) - 14) + 'px';
            dot.style.top = (250 + r * Math.sin(angle) - 14) + 'px';
        });

        // 3. Calcola Accordi Maggiore
        const majTypes = ["", "m", "m", "", "", "m", "ﾂｰ"];
        const majChords = selected.notes.map((n, i) => n + majTypes[i]);
        document.getElementById('maj-title').innerText = `Armonizzazione di ${selected.maj} Maggiore`;
        document.getElementById('maj-body').innerHTML = `<tr>${majChords.map(c => `<td>${c}</td>`).join('')}</tr>`;

        // 4. Calcola Accordi Minore Naturale (stesse note, ma partendo dal vi grado)
        const minNotes = [...selected.notes.slice(5), ...selected.notes.slice(0, 5)];
        const minTypes = ["m", "ﾂｰ", "", "m", "m", "", ""];
        const minChords = minNotes.map((n, i) => n + minTypes[i]);
        document.getElementById('min-title').innerText = `Armonizzazione di ${selected.min} Naturale`;
        document.getElementById('min-body').innerHTML = `<tr>${minChords.map(c => `<td>${c}</td>`).join('')}</tr>`;
    }

    // Inizio automatico su Do
    update(0);
</script>

</body>
</html>
