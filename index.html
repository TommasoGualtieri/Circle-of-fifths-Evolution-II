<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Dashboard Ultra Pro Audio</title>
    <style>
        :root {
            --primary: #66bb6a; --dark-bg: #f4f7f6; --card-bg: #ffffff;
            --text: #333; --accent: #ffca28; --border: #eeeeee; --adv: #ce93d8;
        }
        body.dark-mode {
            --dark-bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; --border: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); margin: 0; padding: 20px; color: var(--text); transition: 0.3s; }
        .dashboard { display: flex; max-width: 1600px; margin: 0 auto; gap: 20px; align-items: flex-start; }
        
        .sidebar { width: 350px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .side-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.75em; }
        .side-card h3 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 5px; font-size: 1.1em; color: var(--primary); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .circle-wrapper { position: relative; width: 440px; height: 440px; background: var(--card-bg); border-radius: 50%; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .note-btn { position: absolute; width: 70px; height: 70px; margin: -35px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: var(--primary); color: white; border: 4px solid var(--card-bg); font-weight: bold; z-index: 5; }
        .note-btn.active { background: #444; transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }
        .degree-marker { position: absolute; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; font-size: 9px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; z-index: 10; border: 2px solid white; transition: 0.5s; }

        .info-card { width: 100%; background: var(--card-bg); border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); overflow: hidden; }
        .card-header { background: rgba(0,0,0,0.03); padding: 10px 20px; font-weight: bold; font-size: 0.9em; display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { padding: 12px 2px; text-align: center; border-top: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        td:hover { background: rgba(102, 187, 106, 0.1); }
        .chord-name { font-weight: bold; display: block; font-size: 1.1em; }
        .chord-notes { font-size: 0.65em; color: var(--accent); font-family: monospace; display: block; margin-top: 3px; }
        .row-label { font-size: 0.6em; color: #999; display: block; text-transform: uppercase; }

        .builder-card { width: 100%; background: var(--card-bg); border-radius: 12px; padding: 20px; border: 2px dashed var(--border); box-sizing: border-box; }
        .prog-display { display: flex; gap: 10px; min-height: 60px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
        .prog-chord { background: var(--primary); color: white; padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 0.9em; cursor: pointer; }
        
        .audio-controls { margin-top: 10px; display: flex; gap: 10px; }
        .play-btn { background: var(--accent); border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .sug-section { border-top: 1px solid var(--border); padding-top: 15px; display: none; }
        .sug-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .sug-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid var(--primary); background: none; color: var(--primary); cursor: pointer; font-size: 0.75em; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <div class="side-card">
            <h3>Tonalità / Circolo</h3>
            <div id="sig-list"></div>
        </div>
        
        <div class="side-card">
            <h3>Legenda Armonia Avanzata</h3>
            <p><b>SubV7:</b> Sostituzione di tritono.</p>
            <p><b>V/V:</b> Dominante della dominante.</p>
            <p><b>iv min:</b> Interscambio modale.</p>
        </div>
    </div>

    <div class="main-content">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0">Harmonic Dashboard Ultra Pro + Audio</h2>
            <button onclick="document.body.classList.toggle('dark-mode')">🌓 Dark Mode</button>
        </div>

        <div class="circle-wrapper" id="circle">
            <div id="deg-0" class="degree-marker">I</div><div id="deg-1" class="degree-marker">ii</div>
            <div id="deg-2" class="degree-marker">iii</div><div id="deg-3" class="degree-marker">IV</div>
            <div id="deg-4" class="degree-marker">V</div><div id="deg-5" class="degree-marker">vi</div>
            <div id="deg-6" class="degree-marker">vii°</div>
        </div>

        <div class="info-card">
            <div class="card-header"><span id="maj-label">Maggiore</span></div>
            <table>
                <tr id="maj-tri"></tr>
                <tr id="maj-quad" style="color:var(--primary)"></tr>
            </table>
        </div>

        <div class="info-card">
            <div class="card-header"><span id="min-label">Minore Naturale</span></div>
            <table>
                <tr id="min-tri"></tr>
                <tr id="min-quad" style="color:var(--primary)"></tr>
            </table>
        </div>

        <div class="info-card" style="border-color: var(--adv);">
            <div class="card-header" style="color:var(--adv)">Armonia Avanzata</div>
            <table><tr id="adv-row"></tr></table>
        </div>

        <div class="builder-card">
            <strong>Progression Builder & Player</strong>
            <div class="prog-display" id="prog-display"></div>
            <div class="audio-controls">
                <button class="play-btn" onclick="playProgression()">▶ Play Progression</button>
                <button onclick="clearProg()">Reset</button>
            </div>
            <div id="sug-container" class="sug-section">
                <div class="sug-list" id="sug-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Configurazione Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notesFreq = {
        "C": 261.63, "C♯": 277.18, "D": 293.66, "D♯": 311.13, "E": 329.63, "F": 349.23, 
        "F♯": 369.99, "G": 392.00, "G♯": 415.30, "A": 440.00, "A♯": 466.16, "B": 493.88
    };

    const data = [
        { maj: "C", min: "Am", notes: ["C","D","E","F","G","A","B"] },
        { maj: "G", min: "Em", notes: ["G","A","B","C","D","E","F♯"] },
        { maj: "D", min: "Bm", notes: ["D","E","F♯","G","A","B","C♯"] },
        { maj: "A", min: "F♯m", notes: ["A","B","C♯","D","E","F♯","G♯"] },
        { maj: "E", min: "C♯m", notes: ["E","F♯","G♯","A","B","C♯","D♯"] },
        { maj: "B", min: "G♯m", notes: ["B","C♯","D♯","E","F♯","G♯","A♯"] },
        { maj: "F", min: "Dm", notes: ["F","G","A","B♭","C","D","E"] }
    ];

    const majT = ["", "m", "m", "", "", "m", "°"];
    const majQ = ["maj7", "m7", "m7", "maj7", "7", "m7", "m7♭5"];
    const minT = ["m", "°", "", "m", "m", "", ""];
    const minQ = ["m7", "m7♭5", "maj7", "m7", "m7", "maj7", "7"];

    let currentProg = [];

    function playNote(freq, start, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.1, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + duration);
    }

    function playChord(chordName) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        // Logica semplificata per trovare le note dell'accordo (Root, 3rd, 5th, 7th)
        // In una versione reale servirebbe un parser completo, qui simuliamo una triade/quadriade base
        const rootStr = chordName.match(/^[A-G][♯♭]?/)[0];
        const rootFreq = notesFreq[rootStr] || 261.63;
        
        playNote(rootFreq, audioCtx.currentTime, 1.5); // Root
        playNote(rootFreq * 1.2, audioCtx.currentTime, 1.5); // 3rd approx
        playNote(rootFreq * 1.5, audioCtx.currentTime, 1.5); // 5th approx
    }

    function init() {
        data.forEach((item, i) => {
            const btn = document.createElement('div');
            btn.className = 'note-btn';
            btn.style.left = (220 + 175 * Math.cos((i * 30 - 90) * Math.PI / 180)) + 'px';
            btn.style.top = (220 + 175 * Math.sin((i * 30 - 90) * Math.PI / 180)) + 'px';
            btn.innerHTML = `<b>${item.maj}</b>`;
            btn.onclick = () => update(i);
            document.getElementById('circle').appendChild(btn);
        });
        update(0);
    }

    function update(idx) {
        const s = data[idx];
        const minN = [...s.notes.slice(5), ...s.notes.slice(0, 5)];

        // Update Maggiore
        document.getElementById('maj-tri').innerHTML = s.notes.map((n, i) => 
            `<td onclick="handleChordClick('${n}${majT[i]}', ${i})"><span class="row-label">Tri</span><b>${n}${majT[i]}</b></td>`).join('');
        document.getElementById('maj-quad').innerHTML = s.notes.map((n, i) => 
            `<td onclick="handleChordClick('${n}${majQ[i]}', ${i})"><span class="row-label">Quad</span><b>${n}${majQ[i]}</b></td>`).join('');

        // Update Minore
        document.getElementById('min-tri').innerHTML = minN.map((n, i) => 
            `<td onclick="handleChordClick('${n}${minT[i]}', -2)"><span class="row-label">Tri</span><b>${n}${minT[i]}</b></td>`).join('');
        document.getElementById('min-quad').innerHTML = minN.map((n, i) => 
            `<td onclick="handleChordClick('${n}${minQ[i]}', -2)"><span class="row-label">Quad</span><b>${n}${minQ[i]}</b></td>`).join('');
        
        // Avanzata
        document.getElementById('adv-row').innerHTML = `
            <td onclick="handleChordClick('SubV7', -1)">SubV7</td>
            <td onclick="handleChordClick('iv min', -1)">iv min</td>`;
    }

    function handleChordClick(name, deg) {
        playChord(name);
        addChordToBuilder(name);
    }

    function addChordToBuilder(name) {
        currentProg.push(name);
        const d = document.getElementById('prog-display');
        const c = document.createElement('div');
        c.className = 'prog-chord';
        c.innerText = name;
        d.appendChild(c);
    }

    function playProgression() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        currentProg.forEach((chord, i) => {
            setTimeout(() => playChord(chord), i * 1000);
        });
    }

    function clearProg() {
        currentProg = [];
        document.getElementById('prog-display').innerHTML = '';
    }

    init();
</script>
</body>
</html>
